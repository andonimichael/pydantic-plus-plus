- case: partial_field_access
  mypy_config: |
    plugins = pydantic_plus_plus.mypy_plugin
  main: |
    from pydantic import BaseModel
    from pydantic_plus_plus.partial import partial

    class User(BaseModel):
        name: str
        age: int

    PartialUser = partial(User, recursive=True)
    p = PartialUser()
    reveal_type(p.name)  # N: Revealed type is "builtins.str | None"
    reveal_type(p.age)  # N: Revealed type is "builtins.int | None"

