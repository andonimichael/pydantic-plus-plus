- case: update_remove_accepts_element_for_sequence
  mypy_config: |
    plugins = pydantic_plus_plus.mypy
  main: |
    from pydantic import BaseModel
    from pydantic_plus_plus.update import update

    class User(BaseModel):
        tags: list[str]
        metadata: dict[str, str]

    user = User(tags=["a"], metadata={"k": "v"})
    update(user).remove(tags="a")
    update(user).remove(metadata="k")

