- case: update_set_nested_model_accepts_dict
  mypy_config: |
    plugins = pydantic_plus_plus.mypy
  main: |
    from pydantic import BaseModel
    from pydantic_plus_plus.update import update

    class Address(BaseModel):
        street: str
        city: str

    class User(BaseModel):
        name: str
        address: Address

    user = User(name="Alice", address=Address(street="1st", city="NYC"))
    update(user).set(address={"city": "LA"})

- case: update_set_nested_model_accepts_updater
  mypy_config: |
    plugins = pydantic_plus_plus.mypy
  main: |
    from pydantic import BaseModel
    from pydantic_plus_plus.update import update

    class Address(BaseModel):
        street: str
        city: str

    class User(BaseModel):
        name: str
        address: Address

    user = User(name="Alice", address=Address(street="1st", city="NYC"))
    update(user).set(address=update(user.address).set(city="LA"))

- case: update_apply_returns_original_type
  mypy_config: |
    plugins = pydantic_plus_plus.mypy
  main: |
    from pydantic import BaseModel
    from pydantic_plus_plus.update import update

    class User(BaseModel):
        name: str
        age: int

    user = User(name="Alice", age=30)
    result = update(user).set(name="Bob").apply()
    reveal_type(result)  # N: Revealed type is "main.User"

