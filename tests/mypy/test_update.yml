- case: update_chained_operations
  mypy_config: |
    plugins = pydantic_plus_plus.mypy
  main: |
    from pydantic import BaseModel
    from pydantic_plus_plus.update import update

    class User(BaseModel):
        name: str
        age: int
        tags: list[str]

    user = User(name="Alice", age=30, tags=[])
    result = update(user).set(name="Bob").append(tags="vip").apply()
    reveal_type(result)  # N: Revealed type is "main.User"

- case: update_set_optional_field_accepts_none
  mypy_config: |
    plugins = pydantic_plus_plus.mypy
  main: |
    from typing import Optional
    from pydantic import BaseModel
    from pydantic_plus_plus.update import update

    class User(BaseModel):
        name: str
        nickname: Optional[str] = None

    user = User(name="Alice")
    update(user).set(nickname=None)

