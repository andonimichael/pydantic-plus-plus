- case: update_set_accepts_valid_fields
  mypy_config: |
    plugins = pydantic_plus_plus.mypy
  main: |
    from pydantic import BaseModel
    from pydantic_plus_plus.update import update

    class User(BaseModel):
        name: str
        age: int

    user = User(name="Alice", age=30)
    update(user).set(name="Bob")
    update(user).set(name="Bob", age=31)

- case: update_set_rejects_nonexistent_field
  mypy_config: |
    plugins = pydantic_plus_plus.mypy
  main: |
    from pydantic import BaseModel
    from pydantic_plus_plus.update import update

    class User(BaseModel):
        name: str

    user = User(name="Alice")
    update(user).set(nonexistent="value")  # E: Unexpected keyword argument "nonexistent"  [call-arg]

- case: update_set_rejects_wrong_type
