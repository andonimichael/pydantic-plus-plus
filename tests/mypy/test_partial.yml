- case: partial_apply_returns_original_type
  mypy_config: |
    plugins = pydantic_plus_plus.mypy
  main: |
    from pydantic import BaseModel
    from pydantic_plus_plus.partial import partial

    class User(BaseModel):
        name: str
        age: int

    PartialUser = partial(User, recursive=True)
    user = User(name="Alice", age=30)
    p = PartialUser(name="Bob")
    updated = p.apply(user)
    reveal_type(updated)  # N: Revealed type is "main.User"

