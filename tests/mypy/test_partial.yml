- case: selective_partial_field_types
  mypy_config: |
    plugins = pydantic_plus_plus.mypy
  main: |
    from pydantic import BaseModel
    from pydantic_plus_plus.partial import partial

    class User(BaseModel):
        name: str
        age: int
        email: str

    PartialUser = partial(User, "name", "email")
    p = PartialUser(age=30)
    reveal_type(p.name)   # N: Revealed type is "builtins.str | None"
    reveal_type(p.age)    # N: Revealed type is "builtins.int"
    reveal_type(p.email)  # N: Revealed type is "builtins.str | None"

- case: selective_partial_constructor
  mypy_config: |
    plugins = pydantic_plus_plus.mypy
  main: |
